name: VisionMind Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Compute version
        shell: powershell
        run: |
          $versionNumber = (git rev-list --count HEAD)
          $version = "v0.0.$versionNumber"
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SHORT_SHA=$shortSha" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZIP_NAME=VisionMind-$version-windows-$shortSha.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        shell: powershell
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name VisionMind `
            --icon docs/icon_256x256.ico `
            --add-data "src/gui/style.qss;src/gui" `
            --add-data "docs/icon_256x256.ico;docs" `
            --add-data "src/core/default_labels.md;src/core" `
            --collect-all open_clip `
            --collect-all huggingface_hub `
            --collect-all transformers `
            --collect-all tokenizers `
            --collect-all tqdm `
            --collect-all faiss `
            --collect-all rawpy `
            --collect-all PIL `
            --hidden-import pyexiftool `
            src/gui/main.py

      - name: Package artifact
        shell: powershell
        run: |
          $zipPath = Join-Path "dist" $env:ZIP_NAME
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "dist/VisionMind/*" -DestinationPath $zipPath

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: dist/*.zip

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Compute version
        shell: bash
        run: |
          VERSION_NUMBER="$(git rev-list --count HEAD)"
          VERSION="v0.0.${VERSION_NUMBER}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "APP_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "${GITHUB_ENV}"
          echo "ZIP_NAME=VisionMind-${VERSION}-macos-${SHORT_SHA}.zip" >> "${GITHUB_ENV}"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build app bundle
        shell: bash
        run: |
          python -m PyInstaller \
            --noconfirm \
            --clean \
            --windowed \
            --onedir \
            --name VisionMind \
            --icon docs/icon.icns \
            --osx-bundle-identifier com.visionmind.app \
            --add-data "src/gui/style.qss:src/gui" \
            --add-data "src/core/default_labels.md:src/core" \
            --add-data "docs/icon.icns:docs" \
            --collect-all open_clip \
            --collect-all huggingface_hub \
            --collect-all tqdm \
            --collect-all faiss \
            --collect-all rawpy \
            --collect-all PIL \
            --collect-all transformers \
            --collect-all tokenizers \
            --hidden-import pyexiftool \
            src/gui/main.py

      - name: Package artifact
        shell: bash
        run: |
          ZIP_PATH="dist/${ZIP_NAME}"
          rm -f "${ZIP_PATH}"
          ditto -c -k --keepParent "dist/VisionMind.app" "${ZIP_PATH}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: dist/*.zip

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        shell: bash
        run: |
          VERSION_NUMBER="$(git rev-list --count HEAD)"
          VERSION="v0.0.${VERSION_NUMBER}"
          echo "APP_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-package
          path: release-assets/macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: VisionMind ${{ env.APP_VERSION }}
          body: Automated release for ${{ env.APP_VERSION }}.
          files: |
            release-assets/windows/*.zip
            release-assets/macos/*.zip
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
