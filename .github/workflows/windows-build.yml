name: Windows Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Compute version
        shell: powershell
        run: |
          $shortSha = $env:GITHUB_SHA.Substring(0, 7)
          $version = $env:GITHUB_REF_NAME
          if (-not $version) {
            $version = git describe --tags --abbrev=0 2>$null
          }
          if (-not $version) {
            $version = "v0.0.0"
          }
          $releaseName = "PhotoManager $version"
          $zipName = "PhotoManager-$version-windows-$shortSha.zip"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
          "RELEASE_NAME=$releaseName" | Out-File -FilePath $env:GITHUB_ENV -Append
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        shell: powershell
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --windowed `
            --onedir `
            --name PhotoManager `
            --icon docs/icon_256x256.ico `
            --add-data "src/gui/style.qss;src/gui" `
            --add-data "docs/icon_256x256.ico;docs" `
            --add-data "src/core/default_labels.md;src/core" `
            --collect-all open_clip `
            --collect-all huggingface_hub `
            --collect-all tqdm `
            --hidden-import pyexiftool `
            src/gui/main.py

      - name: Package release zip
        shell: powershell
        run: |
          $zipPath = Join-Path "dist" $env:ZIP_NAME
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "dist/PhotoManager/*" -DestinationPath $zipPath
          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.APP_VERSION }}
          name: ${{ env.RELEASE_NAME }}
          body: Automated Windows build for ${{ env.APP_VERSION }}.
          files: ${{ env.ZIP_PATH }}
          make_latest: true
          overwrite_files: true
          fail_on_unmatched_files: true
